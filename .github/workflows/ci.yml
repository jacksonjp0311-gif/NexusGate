name: NEXUS GATE CI

on:
  push:
  pull_request:

jobs:
  windows-powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m compileall nexus_gate tests
      - run: python -m unittest discover -s tests
      - shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\nexus_compile.ps1

  ubuntu-bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m compileall nexus_gate tests
      - run: python -m unittest discover -s tests
      - run: bash scripts/nexus_compile.sh
