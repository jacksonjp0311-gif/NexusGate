<title>NEXUS Neural Activity</title>
<style>
:root {
  --cyan: #00f0ff;
  --gold: #ffaa00;
  --magenta: #ff00aa;
  --bg-dark: #010204;
  --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.07) 45%, rgba(0, 240, 255, 0.08));
  --glass-border: rgba(255, 255, 255, 0.24);
  --glass-highlight: rgba(255, 255, 255, 0.42);
}
body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background-color: var(--bg-dark);
  overflow: hidden;
  font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: white;
  user-select: none;
}
canvas {
  display: block;
  width: 100vw;
  height: 100vh;
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
}
.overlay {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
  background:
    radial-gradient(circle at center, transparent 40%, rgba(0, 0, 0, 0.85) 100%),
    repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
  box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
}
.hud-panel {
  position: absolute;
  z-index: 20;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  backdrop-filter: blur(28px) saturate(170%);
  -webkit-backdrop-filter: blur(28px) saturate(170%);
  box-shadow:
    0 18px 45px rgba(0, 0, 0, 0.38),
    inset 0 1px 0 var(--glass-highlight),
    inset 0 -1px 0 rgba(255, 255, 255, 0.08);
  transition: all 0.3s ease;
  pointer-events: auto;
  overflow: hidden;
}
#hud-left { top: clamp(12px, 3vw, 28px); left: clamp(12px, 3vw, 28px); padding: 14px; width: min(230px, calc(100vw - 24px)); }
#hud-right { bottom: clamp(12px, 3vw, 28px); right: clamp(12px, 3vw, 28px); padding: 10px 14px; min-width: 130px; text-align: right; }
.hud-header { border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 8px; margin-bottom: 10px; }
h1 {
  font-size: 11px;
  letter-spacing: 2.6px;
  color: var(--cyan);
  margin: 0 0 4px 0;
  font-weight: 700;
  text-transform: uppercase;
  text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
}
.subtitle { font-size: 8px; color: rgba(255,255,255,0.4); letter-spacing: 1.4px; }
.hud-row { display:flex; justify-content:space-between; gap:18px; margin-bottom:8px; font-size:9px; letter-spacing:0.8px; }
.hud-label { color: rgba(255,255,255,0.5); text-transform: uppercase; }
.hud-value { font-weight:600; color:var(--cyan); text-shadow:0 0 8px rgba(0,240,255,0.5); font-variant-numeric:tabular-nums; }
.value-active { color: var(--gold); text-shadow: 0 0 10px rgba(255, 170, 0, 0.6); }
.value-refract { color: var(--magenta); text-shadow: 0 0 10px rgba(255, 0, 170, 0.6); }
.btn-trigger {
  margin-top: 12px;
  width: 100%;
  padding: 9px 10px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.24);
  color: var(--cyan);
  font-size: 9px;
  letter-spacing: 2px;
  border-radius: 999px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 0 15px rgba(0,240,255,0.1);
}
.btn-trigger:hover { background: rgba(0,240,255,0.15); box-shadow: 0 0 20px rgba(0,240,255,0.4); }
.btn-trigger.disabled { border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); background: transparent; box-shadow: none; cursor: not-allowed; }
.hud-actions {
  display: grid;
  grid-template-columns: 1fr 0.72fr;
  gap: 8px;
}
.hud-actions .btn-trigger {
  letter-spacing: 1.3px;
}
#instructions {
  position:absolute;
  bottom: clamp(14px, 4vw, 40px); left:50%;
  transform:translateX(-50%);
  z-index:20;
  font-size:9px;
  letter-spacing:1.6px;
  color:rgba(255,255,255,0.4);
  pointer-events:none;
  text-transform:uppercase;
  animation:pulseText 2s infinite;
  white-space:nowrap;
}
@keyframes pulseText { 0%,100% { opacity:0.3; } 50% { opacity:0.8; } }
#cursor {
  position:fixed;
  top:0; left:0;
  width:24px; height:24px;
  border:1px solid rgba(0,240,255,0.8);
  border-radius:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:9999;
  transition: width 0.2s, height 0.2s, background 0.2s;
  mix-blend-mode: screen;
  box-shadow: 0 0 10px rgba(0,240,255,0.4);
}
#cursor.click { width:12px; height:12px; background: var(--cyan); border-color: transparent; }
#loader {
  position:absolute;
  top:0; left:0; width:100%; height:100%;
  background: var(--bg-dark);
  z-index:9000;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  transition: opacity 1s ease;
}
.spinner {
  width:50px; height:50px;
  border:2px solid rgba(0,240,255,0.1);
  border-top-color: var(--cyan);
  border-radius:50%;
  animation:spin 1s cubic-bezier(0.4,0,0.2,1) infinite;
  margin-bottom:24px;
  box-shadow:0 0 20px rgba(0,240,255,0.2);
}
@keyframes spin { 100% { transform: rotate(360deg); } }
html.embed #hud-left, html.embed #hud-right, html.embed #instructions, html.embed #cursor { display:none; }
html.embed .overlay {
  background:
    radial-gradient(circle at center, transparent 52%, rgba(0, 0, 0, 0.78) 100%),
    repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 1px, transparent 2px);
  box-shadow: inset 0 0 60px rgba(0,0,0,0.82);
}
html.embed #loader h1 { font-size:8px !important; letter-spacing:1.1px; }
@media (max-width:720px) {
  #hud-left { top:max(10px, env(safe-area-inset-top)); left:10px; width:min(220px, calc(100vw - 20px)); padding:8px 9px; border-radius:13px; }
  #hud-right { right:10px; bottom:max(54px, env(safe-area-inset-bottom)); padding:8px 10px; min-width:112px; }
  h1 { font-size:9px; letter-spacing:1.5px; margin-bottom:0; }
  .subtitle { font-size:6px; letter-spacing:0.7px; text-align:right; }
  .hud-row { gap:10px; margin-bottom:4px; font-size:7px; letter-spacing:0.55px; }
  .hud-actions { gap: 5px; }
  .btn-trigger { margin-top:6px; padding:6px 8px; font-size:7px; letter-spacing:1.2px; }
  #instructions { bottom:max(16px, env(safe-area-inset-bottom)); font-size:8px; letter-spacing:1.1px; }
  #cursor { display:none; }
}

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

const EMBED = document.documentElement.classList.contains("embed");
const cursor = document.getElementById("cursor");
if (cursor) {
  document.addEventListener("mousemove", (e) => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
  });
  document.addEventListener("mousedown", () => cursor.classList.add("click"));
  document.addEventListener("mouseup", () => cursor.classList.remove("click"));
}

const CONFIG = {
  somaRadius: 4.0,
  dendriteTrees: EMBED ? 8 : 14,
  axonTrees: EMBED ? 2 : 4,
  colors: {
    cyan: new THREE.Color("#00e5ff"),
    blue: new THREE.Color("#0033aa"),
    gold: new THREE.Color("#ffaa00"),
    orange: new THREE.Color("#ff4400"),
    magenta: new THREE.Color("#ff0066"),
    violet: new THREE.Color("#6600ff")
  }
};

const STATE = { phase: 0, progress: 0, membraneV: -70.0, axonLoad: 2, sync: 24, isAnimating: false };
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x010204, 0.018);

const camera = new THREE.PerspectiveCamera(EMBED ? 52 : 45, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(EMBED ? 24 : 30, EMBED ? 18 : 20, EMBED ? 48 : 40);

const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, EMBED ? 1.25 : 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), EMBED ? 1.15 : 1.8, 0.6, 0.1);
composer.addPass(bloomPass);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.04;
controls.autoRotate = true;
controls.autoRotateSpeed = EMBED ? 0.35 : 0.6;
controls.enablePan = false;
controls.minDistance = 15;
controls.maxDistance = 140;

const networkGroup = new THREE.Group();
scene.add(networkGroup);
const repoBranchGroup = new THREE.Group();
const repoSignalGroup = new THREE.Group();
networkGroup.add(repoBranchGroup);
networkGroup.add(repoSignalGroup);

const somaMaterial = new THREE.MeshBasicMaterial({ color: CONFIG.colors.cyan, transparent: true, opacity: 0.38, blending: THREE.AdditiveBlending });
const somaWire = new THREE.MeshBasicMaterial({ color: CONFIG.colors.gold, transparent: true, opacity: 0.35, wireframe: true, blending: THREE.AdditiveBlending });
networkGroup.add(new THREE.Mesh(new THREE.IcosahedronGeometry(CONFIG.somaRadius, 5), somaMaterial));
networkGroup.add(new THREE.Mesh(new THREE.IcosahedronGeometry(CONFIG.somaRadius * 1.08, 2), somaWire));

const branchMat = new THREE.MeshBasicMaterial({ color: CONFIG.colors.cyan, transparent: true, opacity: 0.62, blending: THREE.AdditiveBlending, depthWrite: false });
const axonMat = new THREE.MeshBasicMaterial({ color: CONFIG.colors.gold, transparent: true, opacity: 0.78, blending: THREE.AdditiveBlending, depthWrite: false });
const repoBranchMat = new THREE.MeshBasicMaterial({ color: CONFIG.colors.cyan, transparent: true, opacity: 0.78, blending: THREE.AdditiveBlending, depthWrite: false });
const repoAxonMat = new THREE.MeshBasicMaterial({ color: CONFIG.colors.gold, transparent: true, opacity: 0.82, blending: THREE.AdditiveBlending, depthWrite: false });
const repoPulseMat = new THREE.MeshBasicMaterial({ color: 0xff2038, transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending, depthWrite: false });
const synapsePositions = [];
function addSynapse(pos) { synapsePositions.push(pos.x, pos.y, pos.z); }

function buildBranch(startPt, dir, length, radius, level, maxLevels, isAxon) {
  const segments = 10;
  const points = [startPt.clone()];
  let cur = startPt.clone();
  let cDir = dir.clone();
  for (let i = 0; i < segments; i++) {
    const curl = new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5).multiplyScalar(isAxon ? 0.25 : 0.85);
    cDir.add(curl).normalize();
    cur = cur.clone().add(cDir.clone().multiplyScalar(length / segments));
    points.push(cur.clone());
  }
  const curve = new THREE.CatmullRomCurve3(points);
  networkGroup.add(new THREE.Mesh(new THREE.TubeGeometry(curve, segments * 2, radius, 6, false), isAxon ? axonMat : branchMat));
  if (level < maxLevels) {
    const childCount = isAxon ? (Math.random() > 0.35 ? 1 : 2) : (Math.random() > 0.22 ? 2 : 3);
    for (let j = 0; j < childCount; j++) {
      const splitDir = cDir.clone().add(new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(0.85)).normalize();
      buildBranch(cur, splitDir, length * (0.58 + Math.random() * 0.34), radius * 0.66, level + 1, maxLevels, isAxon);
    }
  } else {
    addSynapse(cur);
  }
}

for (let i = 0; i < CONFIG.dendriteTrees; i++) {
  let dir = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
  if (dir.z > 0.3) dir.z -= 0.8;
  dir.normalize();
  buildBranch(dir.clone().multiplyScalar(CONFIG.somaRadius - 0.5), dir, EMBED ? 9 : 12 + Math.random()*5, EMBED ? 0.28 : 0.4, 0, EMBED ? 1 : 2, false);
}
for (let i = 0; i < CONFIG.axonTrees; i++) {
  const dir = new THREE.Vector3((Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5, 1.0).normalize();
  buildBranch(dir.clone().multiplyScalar(CONFIG.somaRadius - 0.5), dir, EMBED ? 20 : 25 + Math.random()*10, EMBED ? 0.42 : 0.6, 0, EMBED ? 1 : 2, true);
}

const synGeo = new THREE.BufferGeometry();
synGeo.setAttribute("position", new THREE.Float32BufferAttribute(synapsePositions, 3));
networkGroup.add(new THREE.Points(synGeo, new THREE.PointsMaterial({ color: CONFIG.colors.gold, size: EMBED ? 0.9 : 1.4, transparent: true, opacity: 0.82, blending: THREE.AdditiveBlending, depthWrite: false })));

const dustGeo = new THREE.BufferGeometry();
const dustCount = EMBED ? 280 : 800;
const dustPos = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount * 3; i++) dustPos[i] = (Math.random() - 0.5) * 150;
dustGeo.setAttribute("position", new THREE.BufferAttribute(dustPos, 3));
const dust = new THREE.Points(dustGeo, new THREE.PointsMaterial({ color: CONFIG.colors.cyan, size: EMBED ? 0.13 : 0.2, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending, depthWrite: false }));
scene.add(dust);

const repoNeuralProfile = {
  nodeCount: 0,
  edgeCount: 0,
  codeRatio: 0,
  interfaceRatio: 0,
  stateRatio: 0,
  doctrineRatio: 0,
  branchEnergy: 1,
  synapticGlow: 1,
  rotationBias: 1,
  impulse: 0
};
let repoGraphCache = null;
let repoNeuralModel = null;
let repoSignalCurves = [];
let repoPulseEvents = [];
const repoPulseGeometry = new THREE.SphereGeometry(EMBED ? 0.34 : 0.56, 14, 14);

function repoHash(value) {
  let h = 2166136261;
  for (const ch of String(value || "")) {
    h ^= ch.charCodeAt(0);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function seededUnit(seed, salt) {
  let h = repoHash(`${seed}:${salt}`);
  h ^= h << 13;
  h ^= h >>> 17;
  h ^= h << 5;
  return ((h >>> 0) % 10000) / 10000;
}

function repoRootFor(path) {
  const normalized = String(path || "").replace(/\\/g, "/");
  if (!normalized || normalized === ".") return "nexus-gate";
  return normalized.split("/")[0] || "nexus-gate";
}

function classifyRepoNode(node) {
  const path = String(node.path || node.name || "").toLowerCase();
  const type = String(node.type || "").toLowerCase();
  if (path.includes("ai") || path.includes("model") || path.includes("nn_router") || path.includes("ollama") || path.includes("api") || path.includes("tesseract") || path.includes("tempe") || path.includes("neural")) return "axon";
  if (type === "interface" || path.startsWith("electron") || path.includes("chatgpt") || path.includes("codex")) return "axon";
  return "dendrite";
}

function buildRepoNeuralModel(graph) {
  const nodes = Array.isArray(graph && graph.nodes) ? graph.nodes : [];
  const rootGroups = new Map();
  nodes.forEach((node) => {
    const rootName = repoRootFor(node.path);
    if (!rootName || rootName === "nexus-gate") return;
    if (!rootGroups.has(rootName)) rootGroups.set(rootName, []);
    rootGroups.get(rootName).push(node);
  });

  const model = { roots: [], hotPaths: [], prunedCount: 0 };
  const latestModified = Math.max(...nodes.map((node) => Number(node.modified || 0)).filter(Boolean), 0);
  const rankedRoots = [...rootGroups.entries()]
    .map(([rootName, rootNodes]) => {
      const rootWeight = rootNodes.reduce((total, node) => total + Number(node.weight || 1), 0);
      const modified = Math.max(...rootNodes.map((node) => Number(node.modified || 0)).filter(Boolean), 0);
      const hasAxon = rootNodes.some((node) => classifyRepoNode(node) === "axon");
      const score = rootWeight + Math.log(rootNodes.length + 1) * 6 + (hasAxon ? 7 : 0) + (modified >= latestModified - 86400000 * 3 ? 4 : 0);
      return { rootName, rootNodes, rootWeight, modified, hasAxon, score };
    })
    .sort((a, b) => b.score - a.score);

  const maxPrimary = EMBED ? 7 : 11;
  const maxAxonPrimary = EMBED ? 2 : 4;
  const axons = rankedRoots.filter((root) => root.hasAxon).slice(0, maxAxonPrimary);
  const dendrites = rankedRoots.filter((root) => !root.hasAxon).slice(0, Math.max(0, maxPrimary - axons.length));
  const selectedRoots = [...dendrites, ...axons].sort((a, b) => b.score - a.score);
  model.prunedCount = Math.max(0, rankedRoots.length - selectedRoots.length);

  selectedRoots.forEach((root, index) => {
    const { rootName, rootNodes, rootWeight, hasAxon } = root;
    const angle = (index / Math.max(selectedRoots.length, 1)) * Math.PI * 2 + seededUnit(rootName, "angle") * 0.28;
    const elevation = (seededUnit(rootName, "elevation") - 0.5) * (EMBED ? 14 : 22);
    const length = (EMBED ? 13 : 19) + Math.min(14, Math.log(rootWeight + 1) * 2.8);
    const dir = new THREE.Vector3(Math.cos(angle), Math.sin(angle) * 0.62, Math.sin(angle * 0.7) + elevation * 0.025).normalize();
    const subGroups = new Map();
    rootNodes
      .filter((node) => node.depth > 1)
      .forEach((node) => {
        const parts = String(node.path || "").replace(/\\/g, "/").split("/");
        const subName = parts[1] || node.name || "root";
        if (!subGroups.has(subName)) subGroups.set(subName, []);
        subGroups.get(subName).push(node);
      });
    const fractalChildren = [...subGroups.entries()]
      .map(([subName, childNodes]) => ({
        subName,
        childNodes,
        hasAxon: childNodes.some((node) => classifyRepoNode(node) === "axon"),
        modified: Math.max(...childNodes.map((node) => Number(node.modified || 0)).filter(Boolean), 0),
        weight: childNodes.reduce((total, node) => total + Number(node.weight || 1), 0)
      }))
      .sort((a, b) => (b.modified - a.modified) || (b.weight - a.weight))
      .slice(0, EMBED ? 4 : 6)
      .map((child) => ({
        ...child,
        terminals: child.childNodes
          .filter((node) => node.depth > 2 || node.type !== "folder")
          .sort((a, b) => Number(b.modified || 0) - Number(a.modified || 0))
          .slice(0, EMBED ? 2 : 3)
      }));
    model.roots.push({ rootName, rootNodes, fractalChildren, hasAxon, dir, length, index });
    rootNodes
      .filter((node) => latestModified && Number(node.modified || 0) >= latestModified - 86400000 * 3)
      .slice(0, 5)
      .forEach((node) => model.hotPaths.push({ rootName, path: node.path, modified: node.modified }));
  });

  if (!model.hotPaths.length) {
    model.hotPaths = nodes
      .slice()
      .sort((a, b) => Number(b.modified || 0) - Number(a.modified || 0))
      .slice(0, 12)
      .map((node) => ({ rootName: repoRootFor(node.path), path: node.path, modified: node.modified }));
  }
  return model;
}

function clearRepoBranches() {
  while (repoBranchGroup.children.length) {
    const child = repoBranchGroup.children.pop();
    if (child.geometry) child.geometry.dispose();
  }
  while (repoSignalGroup.children.length) {
    const child = repoSignalGroup.children.pop();
    if (child.geometry && child.geometry !== repoPulseGeometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
  }
  repoSignalCurves = [];
  repoPulseEvents = [];
}

function repoCurveFromRoot(root, salt, branchIndex, startPoint, baseDir, lengthScale) {
  const start = startPoint ? startPoint.clone() : root.dir.clone().multiplyScalar(CONFIG.somaRadius * 0.82);
  const points = [start];
  let cur = start.clone();
  const mainBend = new THREE.Vector3(
    seededUnit(root.rootName, `${salt}:x`) - 0.5,
    seededUnit(root.rootName, `${salt}:y`) - 0.5,
    seededUnit(root.rootName, `${salt}:z`) - 0.5
  ).multiplyScalar(root.hasAxon ? 1.8 : 3.4);
  const length = root.length * (lengthScale || (branchIndex ? 0.34 + seededUnit(salt, "child-length") * 0.28 : 1));
  const dir = branchIndex
    ? (baseDir || root.dir).clone().add(mainBend.clone().normalize().multiplyScalar(0.56 + seededUnit(salt, "spread") * 0.6)).normalize()
    : (baseDir || root.dir).clone();
  for (let i = 1; i <= 6; i++) {
    const t = i / 6;
    const wiggle = new THREE.Vector3(
      Math.sin(t * Math.PI * 2 + seededUnit(salt, "wx") * 6) * (root.hasAxon ? 0.54 : 1.05),
      Math.cos(t * Math.PI * 1.7 + seededUnit(salt, "wy") * 6) * (root.hasAxon ? 0.42 : 0.88),
      Math.sin(t * Math.PI * 1.3 + seededUnit(salt, "wz") * 6) * (root.hasAxon ? 0.48 : 0.92)
    );
    cur = start.clone().add(dir.clone().multiplyScalar(length * t)).add(mainBend.clone().multiplyScalar(Math.sin(t * Math.PI) * 0.55)).add(wiggle);
    points.push(cur.clone());
  }
  return new THREE.CatmullRomCurve3(points);
}

function renderRepoNeuralNetwork(model) {
  clearRepoBranches();
  if (!model || !Array.isArray(model.roots)) return;
  model.roots.forEach((root) => {
    const mainCurve = repoCurveFromRoot(root, root.rootName, 0);
    const mainRadius = EMBED ? (root.hasAxon ? 0.22 : 0.16) : (root.hasAxon ? 0.38 : 0.26);
    repoBranchGroup.add(new THREE.Mesh(new THREE.TubeGeometry(mainCurve, 42, mainRadius, 7, false), root.hasAxon ? repoAxonMat : repoBranchMat));
    repoSignalCurves.push({ curve: mainCurve, kind: root.hasAxon ? "axon" : "dendrite", path: root.rootName, hot: false });
    root.fractalChildren.forEach((child, idx) => {
      const anchorT = 0.36 + (idx / Math.max(root.fractalChildren.length, 1)) * 0.42;
      const anchor = mainCurve.getPoint(anchorT);
      const side = new THREE.Vector3(
        seededUnit(child.subName, "sx") - 0.5,
        seededUnit(child.subName, "sy") - 0.5,
        seededUnit(child.subName, "sz") - 0.5
      ).normalize();
      const childDir = root.dir.clone().multiplyScalar(0.62).add(side.multiplyScalar(0.82)).normalize();
      const childCurve = repoCurveFromRoot(root, `${root.rootName}/${child.subName}`, idx + 1, anchor, childDir, 0.32 + seededUnit(child.subName, "len") * 0.2);
      const childIsAxon = child.hasAxon || root.hasAxon;
      repoBranchGroup.add(new THREE.Mesh(new THREE.TubeGeometry(childCurve, 24, EMBED ? 0.07 : 0.1, 5, false), childIsAxon ? repoAxonMat : repoBranchMat));
      repoSignalCurves.push({ curve: childCurve, kind: childIsAxon ? "axon" : "dendrite", path: `${root.rootName}/${child.subName}`, hot: child.modified });
      child.terminals.forEach((node, terminalIndex) => {
        const terminalAnchor = childCurve.getPoint(0.58 + terminalIndex * 0.12);
        const terminalDir = childDir.clone().add(new THREE.Vector3(
          seededUnit(node.path, "tx") - 0.5,
          seededUnit(node.path, "ty") - 0.5,
          seededUnit(node.path, "tz") - 0.5
        ).multiplyScalar(0.95)).normalize();
        const terminalCurve = repoCurveFromRoot(root, `${node.path}:${terminalIndex}`, terminalIndex + 10, terminalAnchor, terminalDir, 0.16 + seededUnit(node.path, "flen") * 0.12);
        const isAxon = classifyRepoNode(node) === "axon";
        repoBranchGroup.add(new THREE.Mesh(new THREE.TubeGeometry(terminalCurve, 16, EMBED ? 0.035 : 0.055, 4, false), isAxon ? repoAxonMat : repoBranchMat));
        repoSignalCurves.push({ curve: terminalCurve, kind: isAxon ? "axon" : "dendrite", path: node.path, hot: node.modified });
      });
      const end = childCurve.getPoint(1);
      const syn = new THREE.Mesh(new THREE.BoxGeometry(EMBED ? 0.24 : 0.34, EMBED ? 0.24 : 0.34, EMBED ? 0.24 : 0.34), childIsAxon ? repoAxonMat : repoBranchMat);
      syn.position.copy(end);
      repoBranchGroup.add(syn);
    });
  });
}

function applyRepoNeuralGraph(graph) {
  if (!graph || !Array.isArray(graph.nodes) || !Array.isArray(graph.edges)) return;
  repoGraphCache = graph;
  const nodes = graph.nodes;
  const total = Math.max(1, nodes.length);
  const counts = nodes.reduce((acc, node) => {
    const type = node.type || "artifact";
    acc[type] = (acc[type] || 0) + 1;
    return acc;
  }, {});
  const repoSeed = repoHash(`${graph.generated_at_utc || ""}:${graph.node_count || total}:${graph.edge_count || graph.edges.length}`);
  repoNeuralProfile.nodeCount = total;
  repoNeuralProfile.edgeCount = graph.edges.length;
  repoNeuralProfile.codeRatio = ((counts.python || 0) + (counts.javascript || 0)) / total;
  repoNeuralProfile.interfaceRatio = (counts.interface || 0) / total;
  repoNeuralProfile.stateRatio = (counts.state || 0) / total;
  repoNeuralProfile.doctrineRatio = (counts.doctrine || 0) / total;
  repoNeuralProfile.branchEnergy = 1 + Math.min(0.34, Math.log10(total + 1) * 0.08);
  repoNeuralProfile.synapticGlow = 1 + Math.min(0.45, graph.edges.length / Math.max(total, 1) * 0.28);
  repoNeuralProfile.rotationBias = 0.88 + ((repoSeed % 240) / 1000);
  repoNeuralProfile.impulse = 1;
  branchMat.opacity = 0.58 + Math.min(0.18, repoNeuralProfile.codeRatio * 0.7);
  axonMat.opacity = 0.74 + Math.min(0.16, repoNeuralProfile.interfaceRatio * 0.9);
  repoNeuralModel = buildRepoNeuralModel(graph);
  renderRepoNeuralNetwork(repoNeuralModel);
  triggerRepoPulse("repo-refresh");
}

async function loadRepoGraphFallback() {
  try {
    const res = await fetch("../state/neural_activity/repo_neural_graph_latest.json?ts=" + Date.now());
    if (res.ok) applyRepoNeuralGraph(await res.json());
  } catch (err) {}
}

const btnFire = document.getElementById("btn-fire");
const btnRefresh = document.getElementById("btn-refresh");
function triggerRepoPulse(reason) {
  const hotRoots = new Set((repoNeuralModel && repoNeuralModel.hotPaths || []).map((hot) => repoRootFor(hot.path)));
  const selected = repoSignalCurves
    .filter((entry) => hotRoots.size === 0 || hotRoots.has(repoRootFor(entry.path)) || entry.hot)
    .sort((a, b) => Number(b.hot || 0) - Number(a.hot || 0))
    .slice(0, EMBED ? 10 : 18);
  const curves = selected.length ? selected : repoSignalCurves.slice(0, EMBED ? 10 : 18);
  curves.forEach((entry, index) => {
    const material = repoPulseMat.clone();
    material.opacity = 1;
    const dot = new THREE.Mesh(repoPulseGeometry, material);
    dot.userData.reason = reason || "manual";
    dot.position.copy(entry.curve.getPoint(0));
    repoSignalGroup.add(dot);
    repoPulseEvents.push({ mesh: dot, curve: entry.curve, offset: index * 0.055, speed: 0.92 + (index % 5) * 0.11, age: 0, life: 1.05 + (index % 4) * 0.11 });
  });
  repoNeuralProfile.impulse = 1;
}

function triggerImpulse(e) {
  if (e && e.target && e.target.closest && e.target.closest(".hud-panel") && e.target !== btnFire) return;
  triggerRepoPulse("manual-impulse");
  if (STATE.isAnimating) return;
  STATE.isAnimating = true;
  STATE.phase = 1;
  STATE.progress = 0;
  if (btnFire) { btnFire.classList.add("disabled"); btnFire.innerText = "FIRING SEQUENCE..."; }
}
window.addEventListener("pointerdown", triggerImpulse);
if (btnFire) btnFire.addEventListener("click", triggerImpulse);
if (btnRefresh) btnRefresh.addEventListener("click", (event) => {
  event.stopPropagation();
  btnRefresh.innerText = "Sync";
  loadRepoGraphFallback().finally(() => setTimeout(() => { btnRefresh.innerText = "Refresh"; }, 700));
});
window.addEventListener("message", (event) => {
  const data = event.data || {};
  if (data.type === "NEXUS_NEURAL_REPO_GRAPH") applyRepoNeuralGraph(data.graph);
  if (data.type === "NEXUS_NEURAL_TRIGGER_IMPULSE") triggerImpulse({ target: null });
  if (data.type === "NEXUS_NEURAL_REFRESH" || data.type === "nexus-neural-refresh") loadRepoGraphFallback().then(() => triggerRepoPulse("bridge-refresh"));
});
setTimeout(loadRepoGraphFallback, EMBED ? 500 : 900);
setInterval(loadRepoGraphFallback, EMBED ? 7000 : 12000);

const ui = {
  membrane: document.getElementById("val-membrane"),
  dendrites: document.getElementById("val-dendrites"),
  axon: document.getElementById("val-axon"),
  state: document.getElementById("val-state"),
  sync: document.getElementById("val-sync"),
  camX: document.getElementById("val-cam-x"),
  camY: document.getElementById("val-cam-y"),
  camZ: document.getElementById("val-cam-z")
};

function updateUI(time) {
  if (EMBED) return;
  ui.camX.innerText = camera.position.x.toFixed(2);
  ui.camY.innerText = camera.position.y.toFixed(2);
  ui.camZ.innerText = camera.position.z.toFixed(2);
  let targetMembrane = -70.0, targetAxon = 2, targetSync = 24 + Math.sin(time * 2) * 5;
  let stateText = "RESTING", denText = "CALM";
  [ui.membrane, ui.axon, ui.state].forEach((el) => el.className = "hud-value");
  if (STATE.phase === 1) { stateText = "INCOMING STIMULUS"; denText = "ACTIVE LOAD"; targetMembrane = -55; targetSync = 45; ui.state.classList.add("value-active"); }
  if (STATE.phase === 2) { stateText = "SOMA MERGE"; denText = "CONVERGED"; targetMembrane = 40; targetSync = 85; ui.membrane.classList.add("value-active"); ui.state.classList.add("value-active"); }
  if (STATE.phase === 3) { stateText = "AXON OUTFLOW"; targetMembrane = 20; targetAxon = 98; targetSync = 99; ui.axon.classList.add("value-active"); ui.state.classList.add("value-active"); }
  if (STATE.phase === 4) { stateText = "REFRACTORY PERIOD"; targetMembrane = -80; targetAxon = 15; targetSync = 15; ui.membrane.classList.add("value-refract"); ui.state.classList.add("value-refract"); }
  STATE.membraneV += (targetMembrane - STATE.membraneV) * 0.15;
  STATE.axonLoad += (targetAxon - STATE.axonLoad) * 0.15;
  STATE.sync += (targetSync - STATE.sync) * 0.15;
  ui.membrane.innerText = `${STATE.membraneV > 0 ? "+" : ""}${STATE.membraneV.toFixed(1)} mV`;
  ui.axon.innerText = `${Math.round(STATE.axonLoad).toString().padStart(2, "0")}%`;
  ui.sync.innerText = `${Math.round(STATE.sync).toString().padStart(2, "0")}%`;
  ui.state.innerText = stateText;
  ui.dendrites.innerText = denText;
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const time = clock.getElapsedTime();
  controls.update();
  dust.rotation.y = time * 0.02;
  dust.rotation.x = Math.sin(time * 0.01) * 0.05;
  networkGroup.rotation.y += dt * (EMBED ? 0.07 : 0.035) * repoNeuralProfile.rotationBias;
  const repoPulse = repoNeuralProfile.impulse > 0 ? Math.sin(repoNeuralProfile.impulse * Math.PI) : 0;
  repoNeuralProfile.impulse = Math.max(0, repoNeuralProfile.impulse - dt * 1.45);
  if (STATE.isAnimating) {
    let speed = 1;
    if (STATE.phase === 2) speed = 2.4;
    if (STATE.phase === 4) speed = 0.55;
    STATE.progress += dt * speed;
    const pulse = Math.sin(Math.min(1, STATE.progress) * Math.PI);
    networkGroup.scale.setScalar(1 + pulse * 0.04 + repoPulse * 0.018);
    bloomPass.strength = (EMBED ? 1.15 : 1.8) + pulse * 1.1 + repoPulse * 0.35;
    if (STATE.progress >= 1) {
      STATE.progress = 0;
      STATE.phase += 1;
      if (STATE.phase > 4) {
        STATE.phase = 0;
        STATE.isAnimating = false;
        networkGroup.scale.setScalar(1);
        if (btnFire) { btnFire.classList.remove("disabled"); btnFire.innerText = "MANUAL OVERRIDE"; }
      }
    }
  } else {
    networkGroup.scale.lerp(new THREE.Vector3(1 + repoPulse * 0.025, 1 + repoPulse * 0.025, 1 + repoPulse * 0.025), 0.14);
    bloomPass.strength += (((EMBED ? 1.15 : 1.8) * repoNeuralProfile.synapticGlow + repoPulse * 0.45) - bloomPass.strength) * 0.05;
  }
  repoPulseEvents = repoPulseEvents.filter((pulse) => {
    pulse.age += dt * pulse.speed;
    const t = pulse.age - pulse.offset;
    if (t < 0) return true;
    const normalized = Math.min(1, t / pulse.life);
    pulse.mesh.position.copy(pulse.curve.getPoint(normalized));
    pulse.mesh.scale.setScalar(0.7 + Math.sin(normalized * Math.PI) * 2.2);
    pulse.mesh.material.opacity = Math.max(0, 0.95 * (1 - normalized));
    if (normalized >= 1) {
      repoSignalGroup.remove(pulse.mesh);
      pulse.mesh.material.dispose();
      return false;
    }
    return true;
  });
  updateUI(time);
  composer.render();
}
setTimeout(() => {
  const loader = document.getElementById("loader");
  loader.style.opacity = "0";
  setTimeout(() => loader.style.display = "none", 1000);
}, EMBED ? 600 : 1200);
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, EMBED ? 1.25 : 2));
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  composer.setSize(window.innerWidth, window.innerHeight);
});
animate();
</script>
